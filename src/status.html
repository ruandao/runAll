<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>runAll Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #1a1a2e; color: #e0e0e0; padding: 24px; height: 100vh; overflow: hidden; }
  h1 { font-size: 18px; margin-bottom: 4px; color: #e0e0e0; }
  .workspace { margin-top: 20px; display: flex; width: 100%; height: calc(100vh - 120px); min-height: 0; overflow: hidden; --logs-width: 38%; }
  .services-pane { flex: 1 1 auto; min-width: 320px; min-height: 0; padding-right: 8px; overflow: auto; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 12px; }
  .service { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 4px; background: #16213e; border-radius: 6px; }
  .service:hover { background: #1c2a4a; }
  .name { font-weight: 600; min-width: 140px; }
  .status { font-size: 13px; min-width: 80px; }
  .language { font-size: 12px; color: #a5b4fc; min-width: 72px; }
  .deps { display: flex; gap: 8px; flex-wrap: wrap; }
  .dep { display: flex; align-items: center; gap: 4px; font-size: 12px; background: #0f3460; padding: 2px 8px; border-radius: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot.yellow { background: #facc15; box-shadow: 0 0 6px #facc15; }
  .dot.gray { background: #6b7280; }
  .dot.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .dot.dark { background: #374151; }
  .actions { display: inline-flex; gap: 6px; margin-left: 8px; }
  .action-btn {
    border: 1px solid #555;
    color: #ccc;
    cursor: pointer;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #111827;
    user-select: none;
    transition: transform 90ms ease, background-color 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 140ms ease, filter 140ms ease;
    box-shadow: 0 1px 0 rgba(15, 23, 42, 0.75);
  }
  .action-btn:hover { background: #273449; color: #fff; border-color: #9ca3af; box-shadow: 0 2px 8px rgba(15, 23, 42, 0.55); }
  .action-btn:active { transform: translateY(1px) scale(0.98); filter: brightness(1.12); box-shadow: 0 0 0 rgba(15, 23, 42, 0.2); }
  .action-btn.is-clicked { filter: brightness(1.18); box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.65), 0 0 10px rgba(148, 163, 184, 0.45); }
  .action-btn:focus-visible { outline: 2px solid #60a5fa; outline-offset: 1px; }
  .build-btn { border-color: #4b5563; color: #d1d5db; }
  .action-btn:disabled,
  .action-btn.is-disabled {
    opacity: 0.45;
    cursor: not-allowed;
    color: #6b7280;
    border-color: #374151;
    box-shadow: none;
    filter: none;
  }
  .action-btn:disabled:hover,
  .action-btn.is-disabled:hover {
    background: #111827;
    color: #6b7280;
    border-color: #374151;
    box-shadow: none;
  }
  .action-btn:disabled:active,
  .action-btn.is-disabled:active {
    transform: none;
  }
  .restart-btn { border-color: #1d4ed8; color: #bfdbfe; }
  .logs-btn { border-color: #7c3aed; color: #ddd6fe; }
  .clear-logs-btn { border-color: #b45309; color: #fed7aa; }
  .ports { font-size: 12px; color: #94a3b8; min-width: 120px; }
  .port-link { color: #93c5fd; text-decoration: none; }
  .port-link:hover { color: #bfdbfe; text-decoration: underline; }
  .error-msg { color: #ef4444; font-size: 12px; margin-left: 8px; }
  .last-checked { font-size: 11px; color: #555; margin-left: auto; }
  .level-header { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px 0; }
  .uptime { font-size: 12px; color: #888; margin-top: 20px; }
  .pane-divider { display: none; width: 8px; margin: 0 4px; border-radius: 6px; background: #1e293b; cursor: col-resize; position: relative; }
  .pane-divider::after { content: ''; position: absolute; left: 50%; top: 30%; transform: translateX(-50%); width: 2px; height: 40%; border-radius: 2px; background: #475569; }
  .logs-panel { display: none; width: var(--logs-width); min-width: 320px; max-width: 75vw; min-height: 0; background: #0f172a; border: 1px solid #334155; border-radius: 8px; flex-direction: column; overflow: hidden; }
  .workspace.logs-open .pane-divider { display: block; }
  .workspace.logs-open .logs-panel { display: flex; }
  .logs-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #1e293b; font-size: 13px; }
  .logs-panel-title { font-weight: 600; }
  .logs-panel-meta { color: #94a3b8; font-size: 11px; }
  .logs-panel-actions { display: inline-flex; gap: 8px; }
  .logs-panel-btn {
    background: transparent;
    border: 1px solid #475569;
    color: #cbd5e1;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: transform 90ms ease, background-color 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 140ms ease, filter 140ms ease;
    box-shadow: 0 1px 0 rgba(15, 23, 42, 0.75);
  }
  .logs-panel-btn:hover { background: #334155; border-color: #64748b; color: #fff; box-shadow: 0 2px 8px rgba(2, 6, 23, 0.5); }
  .logs-panel-btn:active { transform: translateY(1px) scale(0.98); filter: brightness(1.12); box-shadow: 0 0 0 rgba(2, 6, 23, 0.2); }
  .logs-panel-btn.is-clicked { filter: brightness(1.18); box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.65), 0 0 10px rgba(148, 163, 184, 0.45); }
  .logs-panel-btn:focus-visible { outline: 2px solid #60a5fa; outline-offset: 1px; }
  .logs-content { margin: 0; padding: 12px 14px; font-size: 12px; line-height: 1.45; white-space: pre-wrap; overflow: auto; color: #dbeafe; min-height: 280px; flex: 1 1 auto; background: #020617; }
  .logs-placeholder { color: #94a3b8; }
  .observability-bar {
    display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; align-items: center;
    margin: 0 0 1rem; padding: 0.65rem 0.85rem; border-radius: 8px;
    background: #1e293b; color: #cbd5e1; font-size: 0.9rem;
  }
  .observability-bar a { color: #38bdf8; text-decoration: none; }
  .observability-bar a:hover { text-decoration: underline; }
  .observability-bar .obs-label { color: #94a3b8; margin-right: 0.25rem; }
</style>
</head>
<body>
<h1>runAll Status</h1>
<div id="observability-bar" class="observability-bar" aria-label="Observability links">
  <span class="obs-label">集中日志:</span>
  <span>加载中…</span>
</div>
<div id="workspace" class="workspace">
  <section class="services-pane">
    <div class="subtitle">auto-refresh every 2s</div>
    <div id="services"></div>
    <div class="uptime" id="uptime"></div>
  </section>
  <div id="pane-divider" class="pane-divider" role="separator" aria-orientation="vertical" aria-label="Resize panels"></div>
  <aside id="logs-panel" class="logs-panel" aria-hidden="true" aria-labelledby="logs-panel-title">
    <div class="logs-panel-header">
      <div>
        <div id="logs-panel-title" class="logs-panel-title">Service Logs</div>
        <div id="logs-panel-meta" class="logs-panel-meta">last 200 lines, auto-refresh every 2s</div>
      </div>
      <div class="logs-panel-actions">
        <button id="logs-panel-loki" class="logs-panel-btn" type="button">Loki</button>
        <button id="logs-panel-grafana" class="logs-panel-btn" type="button">Grafana</button>
        <button id="logs-panel-copy" class="logs-panel-btn" type="button">Copy</button>
        <button id="logs-panel-refresh" class="logs-panel-btn" type="button">Refresh</button>
        <button id="logs-panel-close" class="logs-panel-btn" type="button">Close</button>
      </div>
    </div>
    <pre id="logs-content" class="logs-content logs-placeholder">Select a service to view logs.</pre>
  </aside>
</div>
<script>
const startTime = Date.now();
const statusRefreshMs = 2000;
const logLines = 200;
const minLogsPanelWidth = 320;
const minServicePanelWidth = 380;
const clickFeedbackDurationMs = 160;
const dotClass = {
  healthy: 'green', starting: 'yellow', retrying: 'yellow', restarting: 'yellow',
  pending: 'gray', stopped: 'gray', failed: 'red', skipped: 'dark'
};

function serviceDotClass(svc) {
  if (svc && svc.status === 'healthy' && svc.readiness && svc.readiness !== 'ready') {
    return 'yellow';
  }
  return dotClass[svc.status] || 'gray';
}

function formatServiceStatus(svc) {
  const live = svc.status || 'unknown';
  if (!svc.readiness) {
    return live;
  }
  if (svc.readiness === 'ready') {
    return `${live} · ready`;
  }
  if (svc.readiness === 'degraded') {
    return `${live} · not ready`;
  }
  return `${live} · ${svc.readiness}`;
}
const logsState = {
  open: false,
  service: '',
  timerId: null,
  requestSerial: 0,
  lastRows: [],
};
const layoutState = {
  resizing: false,
};
const clickFeedbackTimers = new WeakMap();
const lifecyclePollMs = 1000;
const lifecyclePollTimeoutMs = 8000;
let lastStatusData = [];
let statusFetchInFlight = null;
let lifecyclePollToken = 0;

function isServiceStartable(status) {
  return status === 'stopped'
    || status === 'failed'
    || status === 'skipped'
    || status === 'pending';
}

function getServiceStatus(name, data) {
  const rows = Array.isArray(data) ? data : lastStatusData;
  const match = rows.find((item) => item && item.name === name);
  return match && typeof match.status === 'string' ? match.status : '';
}

async function fetchStatusData() {
  if (statusFetchInFlight) {
    return statusFetchInFlight;
  }
  statusFetchInFlight = (async () => {
    const resp = await fetch('/api/status');
    if (!resp.ok) {
      throw new Error('HTTP ' + resp.status);
    }
    const data = await resp.json();
    if (!Array.isArray(data)) {
      throw new Error('invalid status payload');
    }
    return data;
  })().finally(() => {
    statusFetchInFlight = null;
  });
  return statusFetchInFlight;
}

function renderStatus(data) {
  const container = document.getElementById('services');
  let html = '';
  const byGroup = new Map();
  for (const svc of data) {
    const groupName = typeof svc.group === 'string' ? svc.group.trim() : '';
    const groupKey = groupName || 'ungrouped';
    if (!byGroup.has(groupKey)) byGroup.set(groupKey, []);
    byGroup.get(groupKey).push(svc);
  }

  const sortedGroups = [...byGroup.entries()].sort((a, b) => {
    if (a[0] === 'ungrouped') return 1;
    if (b[0] === 'ungrouped') return -1;
    return a[0].localeCompare(b[0]);
  });

  for (const [groupKey, services] of sortedGroups) {
    const groupActions = groupKey !== 'ungrouped'
      ? ` <button class="action-btn" type="button" data-action="start-group" data-group="${esc(groupKey)}">启动本组</button>`
        + ` <button class="action-btn" type="button" data-action="stop-group" data-group="${esc(groupKey)}">关闭本组</button>`
      : '';
    const title = groupKey === 'ungrouped' ? 'Ungrouped' : `Group ${groupKey}`;
    html += `<div class="level-header">${esc(title)}${groupActions}</div>`;
    const sortedServices = [...services].sort((a, b) => {
      const depthA = a.depends_on ? a.depends_on.length : 0;
      const depthB = b.depends_on ? b.depends_on.length : 0;
      if (depthA !== depthB) return depthA - depthB;
      return String(a.name || '').localeCompare(String(b.name || ''));
    });
    for (const svc of sortedServices) {
      const cls = serviceDotClass(svc);
      const startable = isServiceStartable(svc.status);
      const toggleAction = startable ? 'start' : 'stop';
      const toggleLabel = startable ? '启动' : '关闭';
      const sessionID = typeof svc.session_id === 'string' ? svc.session_id.trim() : '';
      const healthPort = normalizePortValue(svc.health_port);
      const commandPort = normalizePortValue(svc.command_port);
      const healthHref = resolveHealthHref(svc.url, healthPort);
      const commandHref = commandPort ? `http://localhost:${commandPort}` : '';
      const buildable = svc.buildable === true;
      const language = typeof svc.language === 'string' && svc.language.trim()
        ? svc.language.trim()
        : '—';
      html += `<div class="service">`;
      html += `<span class="dot ${cls}"></span>`;
      html += `<span class="name">${esc(svc.name)}</span>`;
      html += `<span class="status">${formatServiceStatus(svc)}</span>`;
      html += `<span class="language">${esc(language)}</span>`;
      html += `<span class="ports">health/command: ${portLink(healthPort, healthHref)} / ${portLink(commandPort, commandHref)}</span>`;
      html += `<span class="actions">`;
      html += `<button class="action-btn" type="button" data-action="${toggleAction}" data-name="${esc(svc.name)}" data-session-id="${esc(sessionID)}">${toggleLabel}</button>`;
      if (buildable) {
        html += `<button class="action-btn build-btn" type="button" data-action="build" data-name="${esc(svc.name)}">编译</button>`;
      } else {
        html += `<button class="action-btn build-btn is-disabled" type="button" disabled aria-disabled="true" title="未配置 build_command，不可编译">编译</button>`;
      }
      html += `<button class="action-btn restart-btn" type="button" data-action="restart" data-name="${esc(svc.name)}" data-session-id="${esc(sessionID)}">重启</button>`;
      html += `<button class="action-btn logs-btn" type="button" data-action="logs" data-name="${esc(svc.name)}">日志</button>`;
      html += `<button class="action-btn clear-logs-btn" type="button" data-action="clear-logs" data-name="${esc(svc.name)}">清空日志</button>`;
      html += `</span>`;
      if (svc.depends_on && svc.depends_on.length > 0) {
        html += `<span class="deps">`;
        for (const dep of svc.depends_on) {
          const dcls = dotClass[dep.status] || 'gray';
          html += `<span class="dep"><span class="dot ${dcls}"></span>${esc(dep.name)}</span>`;
        }
        html += `</span>`;
      }
      if (svc.error) {
        html += `<span class="error-msg">${esc(svc.error)}</span>`;
      }
      if (svc.readiness_error) {
        html += `<span class="error-msg" title="readiness probe">${esc(svc.readiness_error)}</span>`;
      }
      if (svc.last_checked) {
        html += `<span class="last-checked">checked: ${formatTime(svc.last_checked)}</span>`;
      }
      html += `</div>`;
    }
  }
  container.innerHTML = html;

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('uptime').textContent = `Uptime: ${elapsed}s`;
}

function pulseClickFeedback(buttonEl) {
  if (!buttonEl) {
    return;
  }
  const oldTimer = clickFeedbackTimers.get(buttonEl);
  if (oldTimer) {
    clearTimeout(oldTimer);
  }
  buttonEl.classList.remove('is-clicked');
  // Force a reflow so fast repeated clicks still retrigger the animation.
  void buttonEl.offsetWidth;
  buttonEl.classList.add('is-clicked');
  const timerId = setTimeout(() => {
    buttonEl.classList.remove('is-clicked');
    clickFeedbackTimers.delete(buttonEl);
  }, clickFeedbackDurationMs);
  clickFeedbackTimers.set(buttonEl, timerId);
}

async function refresh() {
  try {
    const data = await fetchStatusData();
    lastStatusData = data;
    renderStatus(data);
  } catch (err) {
    // Keep showing last successful state; update uptime only
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('uptime').textContent = `Uptime: ${elapsed}s (fetch error)`;
  }
}

async function buildService(name) {
  await postServiceAction('/api/build', name, 'Build', false);
}

async function restartService(name, sessionID) {
  await postServiceAction('/api/restart', name, 'Restart', true, sessionID);
}

async function stopService(name, sessionID) {
  await postServiceAction('/api/stop', name, 'Stop', true, sessionID);
}

async function startService(name, sessionID) {
  await postServiceAction('/api/start', name, 'Start', true, sessionID);
}

async function stopGroup(group) {
  await postGroupAction('/api/stop-group', group, 'Stop group');
}

async function startGroup(group) {
  await postGroupAction('/api/start-group', group, 'Start group');
}

async function clearLogs(name) {
  try {
    const resp = await fetch('/api/logs/clear', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name})
    });
    const result = await parseJsonSafe(resp);
    if (!resp.ok) {
      alert('Clear logs failed: ' + (result.error || `${resp.status}`));
      return;
    }
    if (logsState.open && logsState.service === name) {
      fetchLogsOnce();
    }
    refresh();
  } catch (err) {
    alert('Clear logs failed: ' + err.message);
  }
}

function getSessionID() {
  const storageKey = 'runall_session_id';
  const existing = (window.localStorage && localStorage.getItem(storageKey)) || '';
  if (existing && existing.trim()) return existing;
  const generated = (window.crypto && typeof crypto.randomUUID === 'function')
    ? crypto.randomUUID()
    : `session-${Date.now()}`;
  if (window.localStorage) localStorage.setItem(storageKey, generated);
  return generated;
}

function selectActorSessionID(explicitSessionID) {
  const candidate = typeof explicitSessionID === 'string' ? explicitSessionID.trim() : '';
  if (candidate) {
    return candidate;
  }
  return getSessionID();
}

async function pollLifecycleStatus(name, expectStartable) {
  const token = ++lifecyclePollToken;
  const deadline = Date.now() + lifecyclePollTimeoutMs;
  while (Date.now() < deadline) {
    if (token !== lifecyclePollToken) {
      return true;
    }
    await refresh();
    const status = getServiceStatus(name);
    if (status && isServiceStartable(status) === expectStartable) {
      return true;
    }
    await new Promise((resolve) => setTimeout(resolve, lifecyclePollMs));
  }
  return false;
}

async function postServiceAction(url, name, label, includeSession, explicitSessionID) {
  try {
    const previousStatus = getServiceStatus(name);
    const payload = {name: name, cascade: true};
    if (includeSession) {
      payload.session_id = selectActorSessionID(explicitSessionID);
    }
    const resp = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const result = await parseJsonSafe(resp);
    if (!resp.ok) {
      alert(formatActionFailure(label, result));
      return;
    }
    if (result.status === 'accepted' || result.status === 'ok') {
      const expectStartable = url.includes('/api/stop')
        ? true
        : url.includes('/api/start')
          ? false
          : isServiceStartable(previousStatus);
      if (name && (url.includes('/api/stop') || url.includes('/api/start'))) {
        const settled = await pollLifecycleStatus(name, expectStartable);
        if (!settled) {
          alert(`${label} 已提交，但 ${name} 状态未在 ${lifecyclePollTimeoutMs / 1000}s 内更新；请查看 runAll 日志或服务行错误信息`);
        }
        return;
      }
      refresh();
      return;
    }
    alert(formatActionFailure(label, result));
  } catch (err) {
    alert(`${label} failed: ` + err.message);
  }
}

function formatActionFailure(label, result) {
  let message = `${label} failed: ` + (result.error || 'unknown error');
  if (result.cascade && typeof result.cascade === 'object') {
    const failedAt = result.cascade.failed_at || '';
    const completed = Array.isArray(result.cascade.completed) ? result.cascade.completed.join(', ') : '';
    if (failedAt) {
      message += `\nfailed at: ${failedAt}`;
    }
    if (completed) {
      message += `\ncompleted: ${completed}`;
    }
  }
  return message;
}

async function postGroupAction(url, group, label) {
  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({group: group, session_id: getSessionID()})
    });
    const result = await parseJsonSafe(resp);
    if (!resp.ok) {
      alert(`${label} failed: ` + (result.error || `${resp.status}`));
      return;
    }
    if (result.status === 'accepted' || result.status === 'ok') {
      refresh();
      return;
    }
    alert(`${label} failed: unexpected response`);
  } catch (err) {
    alert(`${label} failed: ` + err.message);
  }
}

function openLogsPanel(name) {
  logsState.open = true;
  logsState.service = name;
  logsState.requestSerial += 1;
  const workspace = document.getElementById('workspace');
  workspace.classList.add('logs-open');
  const panel = document.getElementById('logs-panel');
  panel.setAttribute('aria-hidden', 'false');
  updateLogsMeta('loading...');
  document.getElementById('logs-content').textContent = 'Loading logs...';
  stopLogsAutoRefresh();
  fetchLogsOnce();
  logsState.timerId = setInterval(fetchLogsOnce, statusRefreshMs);
}

function closeLogsPanel() {
  logsState.open = false;
  logsState.service = '';
  logsState.lastRows = [];
  logsState.requestSerial += 1;
  stopLogsAutoRefresh();
  const workspace = document.getElementById('workspace');
  workspace.classList.remove('logs-open');
  const panel = document.getElementById('logs-panel');
  panel.setAttribute('aria-hidden', 'true');
}

function stopLogsAutoRefresh() {
  if (logsState.timerId !== null) {
    clearInterval(logsState.timerId);
    logsState.timerId = null;
  }
}

async function fetchLogsOnce() {
  if (!logsState.open || !logsState.service) {
    return;
  }
  const reqId = ++logsState.requestSerial;
  const name = logsState.service;
  try {
    const query = new URLSearchParams({name, lines: String(logLines)});
    const resp = await fetch(`/api/logs?${query.toString()}`);
    const result = await parseJsonSafe(resp);
    if (!resp.ok) {
      throw new Error(result.error || `HTTP ${resp.status}`);
    }
    if (!logsState.open || logsState.service !== name || reqId !== logsState.requestSerial) {
      return;
    }
    renderLogs(result);
  } catch (err) {
    if (!logsState.open || logsState.service !== name || reqId !== logsState.requestSerial) {
      return;
    }
    updateLogsMeta('refresh failed');
    document.getElementById('logs-content').textContent = `Failed to load logs: ${err.message}`;
  }
}

function renderLogs(payload) {
  const name = payload && payload.name ? String(payload.name) : logsState.service;
  const rows = normalizeLogRows(payload && payload.lines ? payload.lines : []);
  logsState.lastRows = rows;
  const content = document.getElementById('logs-content');
  content.textContent = rows.length > 0 ? rows.join('\n') : 'No logs available.';
  updateLogsMeta(`${rows.length} lines - refreshed at ${formatNowTime()}`);
  document.getElementById('logs-panel-title').textContent = `${name} logs`;
}

function extractTraceIdFromText(text) {
  const raw = String(text || '');
  const jsonMatch = raw.match(/"trace_id"\s*:\s*"([^"]+)"/);
  if (jsonMatch && jsonMatch[1]) {
    return jsonMatch[1];
  }
  const bracketMatch = raw.match(/\[trace_id=([^\]]+)\]/);
  if (bracketMatch && bracketMatch[1]) {
    return bracketMatch[1];
  }
  return '';
}

function extractTraceIdFromLogRows(rows) {
  if (!Array.isArray(rows)) {
    return '';
  }
  for (let i = rows.length - 1; i >= 0; i -= 1) {
    const tid = extractTraceIdFromText(rows[i]);
    if (tid) {
      return tid;
    }
  }
  return '';
}

const observabilityState = {
  grafanaUrl: '',
  lokiUrl: '',
  grafanaLokiExplore: '',
  grafanaTempoExplore: '',
  logFileRoot: '',
};

async function loadObservabilityBar() {
  const bar = document.getElementById('observability-bar');
  if (!bar) {
    return;
  }
  try {
    const resp = await fetch('/api/observability');
    const data = await parseJsonSafe(resp);
    if (!resp.ok) {
      bar.innerHTML = '<span class="obs-label">集中日志:</span><span>未配置（启动 ai-monitor 服务）</span>';
      return;
    }
    observabilityState.grafanaUrl = data.grafana_url || '';
    observabilityState.lokiUrl = data.loki_url || '';
    observabilityState.grafanaLokiExplore = data.grafana_loki_explore || '';
    observabilityState.grafanaTempoExplore = data.grafana_tempo_explore || '';
    observabilityState.logFileRoot = data.log_file_root || '';
    const parts = [
      '<span class="obs-label">可观测:</span>',
      observabilityState.grafanaTempoExplore
        ? `<a href="${observabilityState.grafanaTempoExplore}" target="_blank" rel="noopener noreferrer">Tempo Explore</a>`
        : '',
      observabilityState.grafanaLokiExplore
        ? `<a href="${observabilityState.grafanaLokiExplore}" target="_blank" rel="noopener noreferrer">Loki Explore</a>`
        : '',
      observabilityState.grafanaUrl
        ? `<a href="${observabilityState.grafanaUrl}" target="_blank" rel="noopener noreferrer">Grafana</a>`
        : '',
      observabilityState.lokiUrl
        ? `<span>Loki API <a href="${observabilityState.lokiUrl}/ready" target="_blank" rel="noopener noreferrer">${observabilityState.lokiUrl}</a></span>`
        : '',
      observabilityState.logFileRoot
        ? `<span>tee → <code>${observabilityState.logFileRoot}</code> → Promtail (ai-monitor)</span>`
        : '<span>tee 未启用（配置 logging.file_root）</span>',
    ].filter(Boolean);
    bar.innerHTML = parts.join(' · ');
  } catch (err) {
    bar.innerHTML = `<span class="obs-label">集中日志:</span><span>加载失败: ${err.message}</span>`;
  }
}

function openLokiExplore() {
  const url = observabilityState.grafanaLokiExplore || observabilityState.lokiUrl;
  if (!url) {
    alert('Loki 未配置。请确认 ai-monitor 服务已启动。');
    return;
  }
  window.open(url, '_blank', 'noopener,noreferrer');
}

async function openGrafanaTraceLogs() {
  if (!logsState.service) {
    alert('Select a service first.');
    return;
  }
  const params = new URLSearchParams({ service: logsState.service });
  const fromRows = extractTraceIdFromLogRows(logsState.lastRows);
  if (fromRows) {
    params.set('trace_id', fromRows);
  }
  try {
    const resp = await fetch(`/api/observability/grafana-trace?${params.toString()}`);
    const result = await parseJsonSafe(resp);
    if (!resp.ok) {
      const manual = window.prompt('未从日志中识别 trace_id，请手动输入：', fromRows || '');
      if (!manual) {
        return;
      }
      const retry = await fetch(`/api/observability/grafana-trace?${new URLSearchParams({ trace_id: manual.trim() }).toString()}`);
      const retryResult = await parseJsonSafe(retry);
      if (!retry.ok || !retryResult.url) {
        alert(`打开 Grafana 失败: ${retryResult.error || retry.status}`);
        return;
      }
      window.open(retryResult.url, '_blank', 'noopener,noreferrer');
      return;
    }
    if (!result.url) {
      alert('Grafana 链接为空');
      return;
    }
    window.open(result.url, '_blank', 'noopener,noreferrer');
  } catch (err) {
    alert(`打开 Grafana 失败: ${err.message}`);
  }
}

function normalizeLogRows(lines) {
  if (!Array.isArray(lines)) {
    return [];
  }
  return lines.map((line) => {
    if (typeof line === 'string') {
      return line;
    }
    if (line && typeof line === 'object') {
      const ts = line.timestamp ? `[${formatLogTime(line.timestamp)}] ` : '';
      const stream = line.stream ? `(${line.stream}) ` : '';
      const message = line.message !== undefined ? String(line.message) : JSON.stringify(line);
      return `${ts}${stream}${message}`;
    }
    return String(line);
  });
}

async function parseJsonSafe(resp) {
  try {
    return await resp.json();
  } catch (_) {
    return {};
  }
}

function updateLogsMeta(text) {
  document.getElementById('logs-panel-meta').textContent = `${logsState.service || '-'} - ${text} - last ${logLines} lines`;
}

async function copyLogsToClipboard() {
  const contentEl = document.getElementById('logs-content');
  const text = contentEl ? contentEl.textContent : '';
  if (!text || text.trim() === '' || text.includes('Select a service to view logs')) {
    updateLogsMeta('copy failed: no logs');
    return;
  }
  try {
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      await navigator.clipboard.writeText(text);
    } else {
      throw new Error('clipboard API unavailable');
    }
    updateLogsMeta(`copied at ${formatNowTime()}`);
  } catch (err) {
    updateLogsMeta(`copy failed: ${err.message || 'unknown error'}`);
  }
}

function formatNowTime() {
  return formatDateTime(new Date());
}

function formatLogTime(ts) {
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) {
    return String(ts);
  }
  return formatDateTime(d);
}

function formatDateTime(d) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function formatTime(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function normalizePortValue(port) {
  if (port === undefined || port === null) {
    return '';
  }
  const value = String(port).trim();
  if (value === '') {
    return '';
  }
  for (const ch of value) {
    if (ch < '0' || ch > '9') {
      return '';
    }
  }
  return value;
}

function resolveHealthHref(url, fallbackPort) {
  const candidateURL = typeof url === 'string' ? url.trim() : '';
  if (candidateURL) {
    return candidateURL;
  }
  if (!fallbackPort) {
    return '';
  }
  return `http://localhost:${fallbackPort}`;
}

function normalizePortHref(href) {
  const trimmedHref = typeof href === 'string' ? href.trim() : '';
  if (!trimmedHref) {
    return '';
  }
  try {
    const parsed = new URL(trimmedHref);
    if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
      return '';
    }
    return parsed.href;
  } catch (_) {
    return '';
  }
}

function portLink(port, href) {
  const normalizedPort = normalizePortValue(port);
  if (!normalizedPort) {
    return '-';
  }
  const normalizedHref = normalizePortHref(href);
  if (!normalizedHref) {
    return esc(normalizedPort);
  }
  return `<a class="port-link" href="${esc(normalizedHref)}" target="_blank" rel="noopener noreferrer">${esc(normalizedPort)}</a>`;
}

function setLogsPanelWidth(px) {
  const workspace = document.getElementById('workspace');
  const maxWidth = Math.max(minLogsPanelWidth, workspace.clientWidth - minServicePanelWidth - 16);
  const clamped = Math.min(Math.max(px, minLogsPanelWidth), maxWidth);
  workspace.style.setProperty('--logs-width', `${clamped}px`);
}

function handleDividerPointerDown(event) {
  if (!logsState.open) {
    return;
  }
  layoutState.resizing = true;
  event.preventDefault();
  document.body.style.cursor = 'col-resize';
}

function handleDividerPointerMove(event) {
  if (!layoutState.resizing || !logsState.open) {
    return;
  }
  const workspace = document.getElementById('workspace');
  const rect = workspace.getBoundingClientRect();
  const newWidth = rect.right - event.clientX;
  setLogsPanelWidth(newWidth);
}

function handleDividerPointerUp() {
  if (!layoutState.resizing) {
    return;
  }
  layoutState.resizing = false;
  document.body.style.cursor = '';
}

document.getElementById('services').addEventListener('click', (event) => {
  const btn = event.target.closest('button[data-action]');
  if (!btn) {
    return;
  }
  pulseClickFeedback(btn);
  const action = btn.getAttribute('data-action');
  const name = btn.getAttribute('data-name');
  const group = btn.getAttribute('data-group');
  const sessionID = btn.getAttribute('data-session-id') || '';
  if (action === 'start' && name) {
    startService(name, sessionID);
    return;
  }
  if (action === 'stop' && name) {
    stopService(name, sessionID);
    return;
  }
  if (action === 'build') {
    if (!name) return;
    buildService(name);
    return;
  }
  if (action === 'restart') {
    if (!name) return;
    restartService(name, sessionID);
    return;
  }
  if (action === 'logs') {
    if (!name) return;
    openLogsPanel(name);
    return;
  }
  if (action === 'clear-logs') {
    if (!name) return;
    clearLogs(name);
    return;
  }
  if (action === 'stop-group' && group) {
    stopGroup(group);
    return;
  }
  if (action === 'start-group' && group) {
    startGroup(group);
  }
});

document.getElementById('logs-panel-loki').addEventListener('click', (event) => {
  pulseClickFeedback(event.currentTarget);
  openLokiExplore();
});
document.getElementById('logs-panel-grafana').addEventListener('click', (event) => {
  pulseClickFeedback(event.currentTarget);
  openGrafanaTraceLogs();
});
document.getElementById('logs-panel-close').addEventListener('click', (event) => {
  pulseClickFeedback(event.currentTarget);
  closeLogsPanel();
});
document.getElementById('logs-panel-copy').addEventListener('click', (event) => {
  pulseClickFeedback(event.currentTarget);
  copyLogsToClipboard();
});
document.getElementById('logs-panel-refresh').addEventListener('click', (event) => {
  pulseClickFeedback(event.currentTarget);
  fetchLogsOnce();
});
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && logsState.open) {
    closeLogsPanel();
  }
});
document.getElementById('pane-divider').addEventListener('mousedown', handleDividerPointerDown);
window.addEventListener('mousemove', handleDividerPointerMove);
window.addEventListener('mouseup', handleDividerPointerUp);
window.addEventListener('blur', handleDividerPointerUp);
window.addEventListener('resize', () => {
  const workspace = document.getElementById('workspace');
  const currentWidth = parseFloat(workspace.style.getPropertyValue('--logs-width'));
  if (!Number.isNaN(currentWidth)) {
    setLogsPanelWidth(currentWidth);
  }
});

loadObservabilityBar();
refresh();
setInterval(refresh, statusRefreshMs);
</script>
</body>
