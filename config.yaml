# runAll 编排配置 — 与 task2app/conf/port_config.json 端口一致
# 用法（在 runAll 目录）: ./bin/runAll --config ./config.yaml
# 前置: Docker Desktop（基础设施）、task2app 虚拟环境、各前端 npm install、go 工具链

version: "1"

logging:
  file_root: /tmp/runall-logs

observability:
  grafana_url: "http://127.0.0.1:3000"
  loki_url: "http://127.0.0.1:3100"
  trace_dashboard_uid: distributed-trace-view

groups:
  - name: infrastructure
    services:
      # Redis 与 Kafka 拆分为独立栈（dockerInfra/）
      - name: docker-redis
        command: "bash run.sh managed"
        working_dir: dockerInfra/redis
        health_check:
          tcp: "127.0.0.1:6379"
          timeout: 60
          retries: 20
          backoff:
            initial: 1.0
            max: 8.0
            multiplier: 2.0
        on_failure: skip

      - name: docker-kafka
        command: "bash run.sh managed"
        working_dir: dockerInfra/kafka
        health_check:
          url: "http://127.0.0.1:18080"
          timeout: 180
          retries: 40
          backoff:
            initial: 2.0
            max: 16.0
            multiplier: 2.0
        on_failure: skip

  - name: platform
    services:
      - name: task-auth
        command: "bash run.sh"
        working_dir: ../taskAuth
        health_check:
          url: "http://127.0.0.1:8003/api/health/"
          timeout: 60
          retries: 15

      - name: git-oauth
        command: "./run.sh"
        working_dir: ../gitOauth
        health_check:
          url: "http://127.0.0.1:8002/api/health/"
          timeout: 60
          retries: 15

      - name: saas-backend
        command: >-
          bash -c 'source ./activate_env.sh run &&
          cd Saas_project &&
          TASKAUTH_ENABLED=true python3 -u manage.py runserver 0.0.0.0:8001 --noreload'
        working_dir: ../task2app
        env:
          DISABLE_MANAGEPY_VUE_AUTOSTART: "1"
        depends_on: [task-auth, git-oauth, docker-redis, task-sse]
        health_check:
          liveness_url: "http://127.0.0.1:8001/api/live/"
          url: "http://127.0.0.1:8001/api/health/"
          timeout: 180
          retries: 35
          backoff:
            initial: 2.0
            max: 16.0
            multiplier: 2.0
        on_failure: skip

      - name: task-sse
        command: "bash run.sh"
        working_dir: ../taskSSE
        depends_on: [docker-redis]
        health_check:
          url: "http://127.0.0.1:8798/health"
          timeout: 60
          retries: 15
        on_failure: skip

      - name: vue-frontend
        build_command: "npm run build"
        command: "npm run dev"
        working_dir: ../task2app/front_project/app
        depends_on: [saas-backend]
        health_check:
          url: "http://127.0.0.1:4000/health"
          timeout: 90
          retries: 20
        on_failure: skip

      - name: ai-provider
        command: "bash run.sh build && bash run.sh start-embedded"
        working_dir: ../task2app/Saas_Ai_Provider
        depends_on: [saas-backend]
        health_check:
          url: "http://127.0.0.1:8010/api/health/"
          timeout: 180
          retries: 25
          backoff:
            initial: 2.0
            max: 16.0
            multiplier: 2.0
        on_failure: skip

  - name: container-stack
    services:
      - name: go-run-container
        build_command: "./build.sh"
        command: "./start.sh managed --skip-build"
        working_dir: ../go_run_container
        health_check:
          url: "http://127.0.0.1:8796/health"
          timeout: 60
          retries: 15

      - name: go-relay
        build_command: "./build.sh"
        command: "./bin/go_relayToTrae"
        working_dir: ../go_relayToTrae
        health_check:
          url: "http://127.0.0.1:8797/health"
          timeout: 60
          retries: 15
